[mypy]
python_version = 3.8
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy.plugins.numpy.*]
follow_imports = skip

[mypy.plugins.pandas.*]
follow_imports = skip

[mypy.plugins.matplotlib.*]
follow_imports = skip

[mypy-inquirer.*]
ignore_missing_imports = True

[mypy-adri.interactive]
ignore_errors = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-langchain.*]
ignore_missing_imports = True

[mypy-dspy.*]
ignore_missing_imports = True

[mypy-crewai.*]
ignore_missing_imports = True

[mypy-adri.report]
ignore_errors = True

[mypy-adri.templates.*]
ignore_errors = True

[mypy-adri.cli]
ignore_errors = True

[mypy-adri.assessor]
ignore_errors = True

[mypy-adri.integrations.*]
ignore_errors = True
