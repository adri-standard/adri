name: Update Community Catalog Data

on:
  push:
    paths:
      - 'assessed_datasets/**'
  schedule:
    - cron: '0 12 * * 1' # Run weekly on Mondays at noon UTC
  workflow_dispatch:

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml statistics
      
      - name: Update catalog data
        run: python scripts/update_catalog.py
      
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Update community catalog data [automated]"
          file_pattern: docs/data/benchmark.json
