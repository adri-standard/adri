name: Type Check

on:
  push:
    branches: [ main ]
    paths:
      - 'adri/**'
      - '.github/workflows/type-check.yml'
      - 'pyproject.toml'
  pull_request:
    branches: [ main ]
    paths:
      - 'adri/**'
      - '.github/workflows/type-check.yml'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          
      - name: Run mypy
        run: |
          mypy adri
