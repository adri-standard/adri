name: Deploy ADRI Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Allow manual triggering of the workflow
  workflow_dispatch:

jobs:
  build:
    name: Build and deploy documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Load site configuration
        id: config
        run: |
          echo "Loading site configuration from config/site_config.yml"
          SITE_BASE_URL=$(grep 'site_base_url' config/site_config.yml | grep -v '^#' | cut -d':' -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s/"//g')
          if [[ ! $SITE_BASE_URL =~ ^https?:// ]]; then
            echo "Invalid SITE_BASE_URL: $SITE_BASE_URL"
            exit 1
          fi
          echo "SITE_BASE_URL=$SITE_BASE_URL" >> $GITHUB_ENV
          echo "Site URL: $SITE_BASE_URL"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml mkdocs-material mkdocs-macros-plugin
          pip install -e .
          
      - name: Build documentation
        run: |
          echo "Building documentation with site URL: $SITE_BASE_URL"
          SITE_BASE_URL=$SITE_BASE_URL mkdocs build --config-file config/mkdocs.yml
        
      - name: Deploy
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true  # Use clean history
          full_commit_message: 'Deploy documentation with URL: ${{ env.SITE_BASE_URL }} [skip ci]'
