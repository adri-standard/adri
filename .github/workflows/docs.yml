name: Deploy ADRI Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Allow manual triggering of the workflow
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required to make a Pages deployment
permissions:
  contents: write    # To push to gh-pages branch
  pages: write      # To deploy to Pages
  id-token: write   # To verify the deployment originates from an appropriate source

jobs:
  build:
    name: Build and deploy documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Set site URL
        run: |
          echo "SITE_BASE_URL=https://adri-standard.github.io/adri/" >> $GITHUB_ENV
          echo "Site URL: https://adri-standard.github.io/adri/"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml mkdocs-material mkdocs-macros-plugin
          pip install -e .
          
      - name: Build documentation
        run: |
          echo "Building documentation with site URL: $SITE_BASE_URL"
          mkdocs build --config-file adri/config/mkdocs.yml
        
      - name: Deploy
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true  # Use clean history
          keep_files: false  # Delete all existing files
          exclude_assets: ''  # Don't exclude any assets
          full_commit_message: 'Deploy documentation with URL: ${{ env.SITE_BASE_URL }} [skip ci]'
