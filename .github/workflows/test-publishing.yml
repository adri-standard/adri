name: Test PyPI Publishing

# Run only on develop branch and manual trigger
on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  test-publishing:
    name: Test PyPI Publishing
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine requests
      
      - name: Run TestPyPI publishing test
        env:
          TESTPYPI_API_TOKEN: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: python test_publish_to_testpypi.py
