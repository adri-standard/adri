name: Feature Request
description: Suggest a new feature or enhancement for ADRI
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please fill out this form to help us understand your needs.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What use case are you trying to address?
      placeholder: "I'm working on... and I need to... but currently ADRI doesn't support..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented
      placeholder: "I would like ADRI to have a feature that..."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What area of ADRI would this feature enhance?
      options:
        - Core Assessment Engine
        - Data Standards & Validation
        - Reporting & Visualization
        - Integration & APIs
        - Configuration & Setup
        - Documentation
        - Performance & Optimization
        - Security & Privacy
        - Framework Integration (LangChain, CrewAI, etc.)
        - CLI & Developer Tools
        - Other (please specify)
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How important is this feature to your workflow?
      options:
        - Critical (blocking current work)
        - High (significant impact on productivity)
        - Medium (would be helpful)
        - Low (nice to have)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Have you considered any alternative solutions or workarounds?
      placeholder: "I've tried... but it doesn't work because..."

  - type: textarea
    id: examples
    attributes:
      label: Example Usage
      description: How would you use this feature? Provide code examples if possible.
      render: python

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: Do you have any thoughts on how this could be implemented?
      placeholder: "This could work by adding a new method... or extending the existing..."

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or references about the feature request

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this feature hasn't been requested
          required: true
        - label: I have clearly described the problem and proposed solution
          required: true
        - label: This feature aligns with ADRI's core mission of AI data governance
          required: true
