[pytest]
# Non-core ADRI functionality pytest configuration
# Quality feedback requirements with non-blocking behavior

# Non-core test discovery paths
testpaths = tests/examples/
    tests/demo_validation/
    development/testing/tests/test_examples.py
    examples/

# Relaxed options for non-core testing (non-blocking)
addopts = --strict-markers
    --strict-config
    --cov=examples
    --cov-report=term-missing
    --cov-report=html:htmlcov/non-core
    --cov-report=xml:coverage-non-core.xml
    --cov-fail-under=70
    --tb=short
    --maxfail=10
    --continue-on-collection-errors
    -q

# Output style
console_output_style = progress

# Timeout settings - relaxed for non-core
timeout = 60
timeout_method = thread

# Non-core test markers
markers = 
    examples: Example framework integration tests
    demo_validation: Demo credibility and quality tests
    dependency_tests: Dependency error handling tests
    integration_tests: Framework integration tests (non-core)
    smoke_tests: Basic import and functionality smoke tests
    error_handling: Error handling pattern tests
    requires_api_key: Tests requiring external API access
    quick: Fast non-core tests
    non_core_quality: Non-core quality feedback tests
    non_blocking: Tests that provide feedback only

# Error handling - relaxed for non-core (warnings only)
filterwarnings = 
    ignore
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*pkg_resources.*:DeprecationWarning
