[pytest]
# Core ADRI functionality pytest configuration
# Strict testing requirements for core modules with blocking behavior

# Core test discovery paths - ANALYSIS FIRST to prevent pandas state corruption
testpaths = development/testing/tests/unit/analysis/
    development/testing/tests/unit/core/
    development/testing/tests/unit/utils/
    development/testing/tests/unit/cli/
    development/testing/tests/unit/config/
    development/testing/tests/unit/decorators/
    development/testing/tests/unit/standards/
    development/testing/tests/integration/
    development/testing/tests/performance/

# Strict options for core testing (blocking) - simplified coverage to prevent pandas interference
addopts = --strict-markers
    --strict-config
    --cov=adri
    --cov-report=term-missing
    --cov-report=html:htmlcov/core
    --cov-report=xml:coverage-core.xml
    --cov-fail-under=85
    --tb=short
    --maxfail=3
    -v

# Output style
console_output_style = progress

# Timeout settings - strict for core
timeout = 30
timeout_method = thread

# Core test markers
markers = 
    unit: Core unit tests - must pass
    integration: Core integration tests - must pass
    performance: Core performance tests - must pass
    e2e: End-to-end core workflow tests - must pass
    quick: Fast core tests for rapid feedback
    stress: Core stress tests with extreme conditions
    ci_only: Tests that should only run in CI environments
    audit: Core audit logging functionality tests
    csv_output: Core CSV output functionality tests
    core_blocking: Core tests that block merges on failure

# Error handling - balanced for core (pandas compatibility)
filterwarnings = 
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*pkg_resources.*:DeprecationWarning
    ignore:.*data_manager.*:FutureWarning
